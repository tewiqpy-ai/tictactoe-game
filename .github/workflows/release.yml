name: Build & Release APK

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Copy web assets to www
        run: |
          mkdir -p www
          cp index.html menu.html tictactoe.html www/
          cp update-checker.js www/ 2>/dev/null || true

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/tictactoe-release.keystore

      - name: Sync Capacitor
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: npx cap sync android

      - name: Build APK (Release)
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Find APK file
        id: apk
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "No APK found!"
            find android/app/build/outputs -type f -name "*.apk" || true
            exit 1
          fi
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "Found APK: $APK"

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "${{ steps.apk.outputs.path }}" \
            --title "v${{ steps.version.outputs.VERSION }}" \
            --generate-notes
