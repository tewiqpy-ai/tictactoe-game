<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>История игр</title>
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #141929;
    --border: #1e2540;
    --x-color: #00d4ff;
    --o-color: #ff3d7f;
    --text: #e0e6f0;
    --text-dim: #5a6480;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 24px;
    overflow-x: hidden;
  }

  .page-title {
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: 0.04em;
    margin-bottom: 28px;
    text-align: center;
    background: linear-gradient(90deg, #4a5580, #e0e6f0, #ffffff, #e0e6f0, #4a5580);
    background-size: 200% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%, 100% { background-position: 200% center; }
    50% { background-position: 0% center; }
  }

  /* Stats */
  .stats-row {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 440px;
    margin-bottom: 28px;
  }
  .stat-card {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 10px;
    text-align: center;
  }
  .stat-card .stat-value {
    font-size: 1.5rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .stat-card .stat-label {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .stat-card.wins .stat-value { color: #4caf50; }
  .stat-card.loses .stat-value { color: var(--o-color); }
  .stat-card.draws .stat-value { color: var(--text-dim); }
  .stat-card.total .stat-value { color: var(--x-color); }

  /* Game list */
  .game-list {
    width: 100%;
    max-width: 440px;
  }
  .game-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 14px;
    animation: fadeIn 0.3s ease backwards;
  }
  .game-entry:nth-child(1) { animation-delay: 0.05s; }
  .game-entry:nth-child(2) { animation-delay: 0.1s; }
  .game-entry:nth-child(3) { animation-delay: 0.15s; }

  .result-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .result-dot.win { background: #4caf50; }
  .result-dot.lose { background: var(--o-color); }
  .result-dot.draw { background: var(--text-dim); }

  .game-info {
    flex: 1;
    min-width: 0;
  }
  .game-info .game-result {
    font-size: 0.88rem;
    font-weight: 700;
  }
  .game-info .game-result.win { color: #4caf50; }
  .game-info .game-result.lose { color: var(--o-color); }
  .game-info .game-result.draw { color: var(--text-dim); }
  .game-info .game-meta {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .game-date {
    font-size: 0.72rem;
    color: var(--text-dim);
    white-space: nowrap;
  }

  .empty-state {
    text-align: center;
    color: var(--text-dim);
    padding: 40px 20px;
    font-size: 0.9rem;
  }

  .loading {
    text-align: center;
    color: var(--text-dim);
    padding: 40px 20px;
    font-size: 0.85rem;
  }

  .back-btn {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 24px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    text-decoration: none;
    display: inline-block;
    margin-top: 20px;
  }
  .back-btn:hover {
    border-color: var(--x-color);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 400px) {
    body { padding: 28px 16px; }
    .page-title { font-size: 1.3rem; }
    .stats-row { gap: 8px; }
    .stat-card { padding: 10px 6px; }
    .stat-card .stat-value { font-size: 1.2rem; }
  }

  /* Auth */
  .auth-container {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 100;
  }
  .auth-login-btn {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 16px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .auth-login-btn:hover {
    border-color: var(--x-color);
    background: rgba(0, 212, 255, 0.05);
  }
  .auth-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    position: relative;
    border: 2px solid var(--border);
    overflow: visible;
    transition: border-color 0.2s;
  }
  .auth-avatar:hover {
    border-color: var(--x-color);
  }
  .auth-avatar img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    display: block;
  }
  .auth-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    min-width: 200px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    animation: fadeIn 0.2s ease;
  }
  .auth-dropdown.open {
    display: block;
  }
  .auth-dropdown-name {
    font-size: 0.88rem;
    font-weight: 700;
    margin-bottom: 2px;
  }
  .auth-dropdown-email {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-bottom: 12px;
    word-break: break-all;
  }
  .auth-dropdown-btn {
    width: 100%;
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .auth-dropdown-btn:hover {
    border-color: var(--o-color);
    color: var(--o-color);
  }
</style>
</head>
<body>

<div class="auth-container" id="auth-container"></div>

<div class="page-title">История игр</div>

<div class="stats-row" id="stats-row" style="display:none">
  <div class="stat-card total">
    <div class="stat-value" id="stat-total">0</div>
    <div class="stat-label">Всего</div>
  </div>
  <div class="stat-card wins">
    <div class="stat-value" id="stat-wins">0</div>
    <div class="stat-label">Побед</div>
  </div>
  <div class="stat-card loses">
    <div class="stat-value" id="stat-loses">0</div>
    <div class="stat-label">Поражений</div>
  </div>
  <div class="stat-card draws">
    <div class="stat-value" id="stat-draws">0</div>
    <div class="stat-label">Ничьих</div>
  </div>
</div>

<div class="game-list" id="game-list">
  <div class="loading">Загрузка...</div>
</div>

<a class="back-btn" href="tictactoe.html">Назад</a>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
  if (!firebase.apps.length) {
    firebase.initializeApp({
      apiKey: "AIzaSyDylaym85cTkafDl5OitpEZKrUuwwJHn_w",
      authDomain: "tictactoe-5ba18.firebaseapp.com",
      projectId: "tictactoe-5ba18",
      storageBucket: "tictactoe-5ba18.firebasestorage.app",
      messagingSenderId: "23885470883",
      appId: "1:23885470883:web:3289b4378c236767a47316"
    });
  }
  const auth = firebase.auth();
  const db = firebase.firestore();
  const provider = new firebase.auth.GoogleAuthProvider();

  const RESULT_LABELS = { win: 'Победа', lose: 'Поражение', draw: 'Ничья' };
  const DIFF_LABELS = { easy: 'Лёгкий', medium: 'Средний', hard: 'Невозможный' };
  const SIDE_LABELS = { X: 'Крестики', O: 'Нолики' };

  function formatDate(ts) {
    if (!ts) return '';
    const d = ts.toDate();
    return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
  }

  function updateAuthUI(user) {
    const container = document.getElementById('auth-container');
    if (!container) return;

    if (user) {
      const photo = user.photoURL || '';
      container.innerHTML = `
        <div class="auth-avatar" id="auth-avatar">
          <img src="${photo}" alt="avatar" referrerpolicy="no-referrer">
          <div class="auth-dropdown" id="auth-dropdown">
            <div class="auth-dropdown-name">${user.displayName || ''}</div>
            <div class="auth-dropdown-email">${user.email || ''}</div>
            <button class="auth-dropdown-btn" id="auth-logout">Выйти</button>
          </div>
        </div>
      `;
      document.getElementById('auth-logout').onclick = () => auth.signOut();
      document.getElementById('auth-avatar').onclick = (e) => {
        e.stopPropagation();
        document.getElementById('auth-dropdown').classList.toggle('open');
      };
      document.onclick = () => {
        const dd = document.getElementById('auth-dropdown');
        if (dd) dd.classList.remove('open');
      };
    } else {
      container.innerHTML = `<button class="auth-login-btn" id="auth-login">Войти</button>`;
      document.getElementById('auth-login').onclick = () => handleGoogleSignIn();
    }
  }

  async function handleGoogleSignIn() {
    if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.FirebaseAuthentication) {
      try {
        const result = await window.Capacitor.Plugins.FirebaseAuthentication.signInWithGoogle();
        if (result && result.credential) {
          const credential = firebase.auth.GoogleAuthProvider.credential(
            result.credential.idToken || null,
            result.credential.accessToken || null
          );
          await auth.signInWithCredential(credential);
        }
        return;
      } catch (e) {
        console.error('Native Google Sign-In error:', e);
      }
    }
    auth.signInWithPopup(provider).catch(e => console.error('Web Google Sign-In error:', e));
  }

  async function loadHistory(user) {
    const gameList = document.getElementById('game-list');
    if (!user) {
      gameList.innerHTML = '<div class="empty-state">Войдите через Google, чтобы видеть историю игр</div>';
      document.getElementById('stats-row').style.display = 'none';
      return;
    }

    try {
      const snap = await db.collection('users').doc(user.uid).collection('games')
        .orderBy('timestamp', 'desc').limit(50).get();

      if (snap.empty) {
        gameList.innerHTML = '<div class="empty-state">Пока нет игр. Сыграйте первую!</div>';
        document.getElementById('stats-row').style.display = 'none';
        return;
      }

      let wins = 0, loses = 0, draws = 0;
      const entries = [];

      snap.forEach(doc => {
        const g = doc.data();
        if (g.result === 'win') wins++;
        else if (g.result === 'lose') loses++;
        else draws++;

        entries.push(`
          <div class="game-entry">
            <div class="result-dot ${g.result}"></div>
            <div class="game-info">
              <div class="game-result ${g.result}">${RESULT_LABELS[g.result] || g.result}</div>
              <div class="game-meta">${DIFF_LABELS[g.difficulty] || g.difficulty} · ${SIDE_LABELS[g.playerMark] || g.playerMark}</div>
            </div>
            <div class="game-date">${formatDate(g.timestamp)}</div>
          </div>
        `);
      });

      document.getElementById('stat-total').textContent = wins + loses + draws;
      document.getElementById('stat-wins').textContent = wins;
      document.getElementById('stat-loses').textContent = loses;
      document.getElementById('stat-draws').textContent = draws;
      document.getElementById('stats-row').style.display = 'flex';
      gameList.innerHTML = entries.join('');
    } catch (e) {
      console.error('Load history error:', e);
      gameList.innerHTML = '<div class="empty-state">Ошибка загрузки истории</div>';
    }
  }

  auth.onAuthStateChanged(async (user) => {
    updateAuthUI(user);
    loadHistory(user);
  });
</script>

</body>
</html>
