<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Крестики-Нолики</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #141929;
    --border: #1e2540;
    --x-color: #00d4ff;
    --o-color: #ff3d7f;
    --win-glow: #ffd700;
    --text: #e0e6f0;
    --text-dim: #5a6480;
    --cell-hover: #1a2035;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  ::selection { background: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
  }

  /* ── Screens ── */
  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 440px;
    animation: fadeIn 0.4s ease;
  }
  .screen.active { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Start Screen ── */
  .start-logo {
    font-size: 4.5rem;
    font-weight: 800;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
    text-align: center;
    line-height: 1.1;
  }
  .start-logo .x { color: var(--x-color); }
  .start-logo .o { color: var(--o-color); }

  .start-tagline {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    margin-bottom: 40px;
    text-align: center;
    background: linear-gradient(90deg, #4a5580, #e0e6f0, #ffffff, #e0e6f0, #4a5580);
    background-size: 200% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%, 100% { background-position: 200% center; }
    50% { background-position: 0% center; }
  }

  .start-grid {
    display: grid;
    grid-template-columns: repeat(3, 56px);
    gap: 8px;
    margin-bottom: 40px;
  }
  .start-grid .sg-cell {
    width: 56px; height: 56px;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: floatIn 0.5s ease backwards;
  }
  .start-grid .sg-cell:nth-child(1) { animation-delay: 0.05s; }
  .start-grid .sg-cell:nth-child(2) { animation-delay: 0.10s; }
  .start-grid .sg-cell:nth-child(3) { animation-delay: 0.15s; }
  .start-grid .sg-cell:nth-child(4) { animation-delay: 0.20s; }
  .start-grid .sg-cell:nth-child(5) { animation-delay: 0.25s; }
  .start-grid .sg-cell:nth-child(6) { animation-delay: 0.30s; }
  .start-grid .sg-cell:nth-child(7) { animation-delay: 0.35s; }
  .start-grid .sg-cell:nth-child(8) { animation-delay: 0.40s; }
  .start-grid .sg-cell:nth-child(9) { animation-delay: 0.45s; }

  @keyframes floatIn {
    from { opacity: 0; transform: scale(0.7); }
    to { opacity: 1; transform: scale(1); }
  }

  .start-grid .sg-cell svg {
    width: 32px; height: 32px;
  }

  /* Start Difficulty Picker */
  .start-section-label {
    color: var(--text-dim);
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    margin-bottom: 10px;
  }

  .start-diff-picker {
    display: flex;
    gap: 10px;
    margin-bottom: 32px;
    justify-content: center;
  }

  .start-diff-card {
    padding: 12px 16px;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    min-width: 90px;
    position: relative;
    overflow: hidden;
  }

  .start-diff-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 10px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .start-diff-card:hover { transform: translateY(-2px); }
  .start-diff-card:hover::before { opacity: 1; }

  .start-diff-card.active {
    border-color: var(--x-color);
    box-shadow: 0 0 16px rgba(0, 212, 255, 0.15);
  }
  .start-diff-card.active::before { opacity: 1; }

  .start-diff-card[data-side="X"].active {
    border-color: var(--x-color);
    box-shadow: 0 0 16px rgba(0, 212, 255, 0.2);
  }
  .start-diff-card[data-side="X"].active::before { background: radial-gradient(circle at 50% 30%, rgba(0,212,255,0.15), transparent 70%); }

  .start-diff-card[data-side="O"].active {
    border-color: var(--o-color);
    box-shadow: 0 0 16px rgba(255, 61, 127, 0.2);
  }
  .start-diff-card[data-side="O"].active::before { background: radial-gradient(circle at 50% 30%, rgba(255,61,127,0.15), transparent 70%); }

  .start-diff-card .diff-icon {
    font-size: 1.5rem;
    margin-bottom: 4px;
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .start-diff-card .diff-icon svg {
    width: 28px;
    height: 28px;
  }

  .start-diff-card .diff-name {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text-dim);
    position: relative;
    z-index: 1;
  }
  .start-diff-card.active .diff-name { color: var(--text); }

  .start-diff-card.easy::before { background: radial-gradient(circle at 50% 30%, rgba(76,175,80,0.15), transparent 70%); }
  .start-diff-card.easy.active { border-color: #4caf50; box-shadow: 0 0 16px rgba(76,175,80,0.2); }
  .start-diff-card.easy .diff-icon { color: #4caf50; }

  .start-diff-card.medium::before { background: radial-gradient(circle at 50% 30%, rgba(255,193,7,0.15), transparent 70%); }
  .start-diff-card.medium.active { border-color: #ffc107; box-shadow: 0 0 16px rgba(255,193,7,0.2); }
  .start-diff-card.medium .diff-icon { color: #ffc107; }

  .start-diff-card.hard::before { background: radial-gradient(circle at 50% 30%, rgba(255,61,127,0.15), transparent 70%); }
  .start-diff-card.hard.active { border-color: var(--o-color); box-shadow: 0 0 16px rgba(255,61,127,0.2); }
  .start-diff-card.hard .diff-icon { color: var(--o-color); }

  .start-hint {
    color: var(--text-dim);
    font-size: 0.78rem;
    margin-top: -24px;
    margin-bottom: 28px;
    text-align: center;
    min-height: 1em;
    transition: color 0.2s;
  }
  .start-hint.first { color: var(--x-color); }
  .start-hint.second { color: var(--o-color); }

  .btn-start {
    background: linear-gradient(135deg, var(--x-color), #0090cc);
    color: var(--bg);
    border: none;
    border-radius: 14px;
    padding: 16px 52px;
    font-size: 1.15rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.04em;
    transition: transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 24px rgba(0, 212, 255, 0.25);
  }
  .btn-start:hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 8px 32px rgba(0, 212, 255, 0.35);
  }
  .btn-start:active {
    transform: translateY(0) scale(0.98);
  }

  /* ── Game Screen ── */
  h1 {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
    text-align: center;
  }
  h1 .x { color: var(--x-color); }
  h1 .o { color: var(--o-color); }

  .subtitle {
    color: var(--text-dim);
    font-size: 0.88rem;
    margin-bottom: 20px;
    text-align: center;
  }

  /* Scoreboard */
  .scoreboard {
    display: flex;
    gap: 28px;
    margin-bottom: 20px;
  }
  .score-card {
    text-align: center;
    min-width: 72px;
  }
  .score-card .label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    margin-bottom: 2px;
  }
  .score-card .value {
    font-size: 1.8rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .score-card.player .value { color: var(--x-color); }
  .score-card.draw .value { color: var(--text-dim); }
  .score-card.bot .value { color: var(--o-color); }

  .status {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 16px;
    min-height: 28px;
    text-align: center;
    transition: color 0.3s;
  }
  .status.win { color: var(--win-glow); }
  .status.lose { color: var(--o-color); }
  .status.draw { color: var(--text-dim); }

  /* Board */
  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    background: var(--border);
    border-radius: 16px;
    padding: 6px;
    width: min(340px, calc(100vw - 48px));
    aspect-ratio: 1;
    box-shadow: 0 0 60px rgba(0, 212, 255, 0.05), 0 0 60px rgba(255, 61, 127, 0.05);
  }
  .cell {
    background: var(--surface);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    aspect-ratio: 1;
    transition: background 0.15s, transform 0.1s;
  }
  .cell:hover:not(.taken) { background: var(--cell-hover); transform: scale(1.03); }
  .cell:active:not(.taken) { transform: scale(0.97); }
  .cell.taken { cursor: default; }
  .cell svg {
    width: 52%; height: 52%;
    opacity: 0; transform: scale(0.5);
    animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  .cell.win-cell { animation: winPulse 0.8s ease-in-out infinite alternate; }

  @keyframes popIn { to { opacity: 1; transform: scale(1); } }
  @keyframes winPulse {
    0% { background: var(--surface); }
    100% { background: rgba(255, 215, 0, 0.08); }
  }

  /* Controls */
  .controls {
    margin-top: 24px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  button.btn {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  button.btn:hover { background: var(--cell-hover); border-color: var(--x-color); }
  button.btn.primary { background: var(--x-color); color: var(--bg); border-color: var(--x-color); }
  button.btn.primary:hover { background: #00bce6; border-color: #00bce6; }

  @media (max-width: 400px) {
    .start-logo { font-size: 3rem; }
    .start-diff-card { min-width: 78px; padding: 10px 10px; }
    .start-diff-card .diff-icon svg { width: 24px; height: 24px; }
    .scoreboard { gap: 20px; }
    .score-card .value { font-size: 1.5rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    .screen { animation: none; }
    .start-grid .sg-cell { animation: none; opacity: 1; }
    .cell svg { animation: none; opacity: 1; transform: scale(1); }
    .cell.win-cell { animation: none; }
    .cell { transition: none; }
  }
</style>
</head>
<body>

<!-- ═══════ START SCREEN ═══════ -->
<div class="screen active" id="screen-start">
  <div class="start-tagline">Крестики-Нолики с ботом</div>

  <div class="start-grid">
    <div class="sg-cell"><svg viewBox="0 0 100 100"><line x1="10" y1="10" x2="90" y2="90" stroke="var(--x-color)" stroke-width="10" stroke-linecap="round"/><line x1="90" y1="10" x2="10" y2="90" stroke="var(--x-color)" stroke-width="10" stroke-linecap="round"/></svg></div>
    <div class="sg-cell"></div>
    <div class="sg-cell"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="none" stroke="var(--o-color)" stroke-width="10"/></svg></div>
    <div class="sg-cell"></div>
    <div class="sg-cell"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="none" stroke="var(--o-color)" stroke-width="10"/></svg></div>
    <div class="sg-cell"><svg viewBox="0 0 100 100"><line x1="10" y1="10" x2="90" y2="90" stroke="var(--x-color)" stroke-width="10" stroke-linecap="round"/><line x1="90" y1="10" x2="10" y2="90" stroke="var(--x-color)" stroke-width="10" stroke-linecap="round"/></svg></div>
    <div class="sg-cell"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="none" stroke="var(--o-color)" stroke-width="10"/></svg></div>
    <div class="sg-cell"><svg viewBox="0 0 100 100"><line x1="10" y1="10" x2="90" y2="90" stroke="var(--x-color)" stroke-width="10" stroke-linecap="round"/><line x1="90" y1="10" x2="10" y2="90" stroke="var(--x-color)" stroke-width="10" stroke-linecap="round"/></svg></div>
    <div class="sg-cell"></div>
  </div>

  <div class="start-section-label">Сторона</div>
  <div class="start-diff-picker">
    <div class="start-diff-card active" data-side="X" onclick="setSide('X')" style="min-width:110px">
      <div class="diff-icon" style="margin-bottom:2px">
        <svg width="28" height="28" viewBox="0 0 100 100"><line x1="10" y1="10" x2="90" y2="90" stroke="var(--x-color)" stroke-width="12" stroke-linecap="round"/><line x1="90" y1="10" x2="10" y2="90" stroke="var(--x-color)" stroke-width="12" stroke-linecap="round"/></svg>
      </div>
      <div class="diff-name">Крестик</div>
    </div>
    <div class="start-diff-card" data-side="O" onclick="setSide('O')" style="min-width:110px">
      <div class="diff-icon" style="margin-bottom:2px">
        <svg width="28" height="28" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="none" stroke="var(--o-color)" stroke-width="12" stroke-linecap="round"/></svg>
      </div>
      <div class="diff-name">Нолик</div>
    </div>
  </div>
  <div class="start-hint first" id="start-hint">Вы ходите первым</div>

  <div class="start-section-label">Сложность</div>
  <div class="start-diff-picker">
    <div class="start-diff-card easy active" data-diff="easy" onclick="setDifficulty('easy')">
      <div class="diff-icon">&#9786;</div>
      <div class="diff-name">Лёгкий</div>
    </div>
    <div class="start-diff-card medium" data-diff="medium" onclick="setDifficulty('medium')">
      <div class="diff-icon">&#9783;</div>
      <div class="diff-name">Средний</div>
    </div>
    <div class="start-diff-card hard" data-diff="hard" onclick="setDifficulty('hard')">
      <div class="diff-icon">&#9760;</div>
      <div class="diff-name">Невозможный</div>
    </div>
  </div>

  <button class="btn-start" onclick="startGame()">Начать игру</button>

  <div style="margin-top: 16px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
    <button class="btn" onclick="window.location.href='menu.html'" style="font-size: 0.85rem; padding: 10px 24px;">К играм</button>
    <button class="btn" onclick="window.location.href='history.html'" style="font-size: 0.85rem; padding: 10px 24px;" id="btn-history">История</button>
  </div>
</div>

<!-- ═══════ GAME SCREEN ═══════ -->
<div class="screen" id="screen-game">
  <h1><span class="x">Крестики</span> · <span class="o">Нолики</span></h1>
  <p class="subtitle" id="subtitle"></p>

  <div class="scoreboard">
    <div class="score-card player">
      <div class="label">Вы</div>
      <div class="value" id="score-player">0</div>
    </div>
    <div class="score-card draw">
      <div class="label">Ничья</div>
      <div class="value" id="score-draw">0</div>
    </div>
    <div class="score-card bot">
      <div class="label">Бот</div>
      <div class="value" id="score-bot">0</div>
    </div>
  </div>

  <div class="status" id="status">Ваш ход</div>

  <div class="board" id="board"></div>

  <div class="controls">
    <button class="btn" onclick="newGame()" style="font-size: 0.85rem; padding: 10px 24px;">Новая игра</button>
  </div>
</div>

<script>
const WINNING_LINES = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

let board = Array(9).fill('');
let gameOver = false;
let locked = false;
let scores = { player: 0, draw: 0, bot: 0 };
let difficulty = 'easy';
let playerMark = 'X';
let botMark = 'O';

const boardEl = document.getElementById('board');
const statusEl = document.getElementById('status');
const subtitleEl = document.getElementById('subtitle');
const startHintEl = document.getElementById('start-hint');

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function newGame() {
  scores = { player: 0, draw: 0, bot: 0 };
  updateScore();
  showScreen('screen-start');
}

function startGame() {
  showScreen('screen-game');
  subtitleEl.textContent = playerMark === 'X'
    ? 'Вы играете за крестики. Бот — за нолики.'
    : 'Вы играете за нолики. Бот — за крестики.';
  resetGame();
}

function createBoard() {
  boardEl.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const cell = document.createElement('button');
    cell.className = 'cell';
    cell.setAttribute('aria-label', `Клетка ${i + 1}`);
    cell.addEventListener('click', () => playerMove(i));
    boardEl.appendChild(cell);
  }
}

function renderMark(index, mark) {
  const cell = boardEl.children[index];
  cell.classList.add('taken');
  cell.innerHTML = mark === 'X'
    ? `<svg viewBox="0 0 100 100"><line x1="10" y1="10" x2="90" y2="90" stroke="var(--x-color)" stroke-width="10" stroke-linecap="round"/><line x1="90" y1="10" x2="10" y2="90" stroke="var(--x-color)" stroke-width="10" stroke-linecap="round"/></svg>`
    : `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="none" stroke="var(--o-color)" stroke-width="10" stroke-linecap="round"/></svg>`;
}

function checkWin(b, mark) {
  for (const line of WINNING_LINES) {
    if (line.every(i => b[i] === mark)) return line;
  }
  return null;
}

function isFull(b) { return b.every(c => c !== ''); }

function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = 'status' + (cls ? ' ' + cls : '');
}

function updateScore() {
  document.getElementById('score-player').textContent = scores.player;
  document.getElementById('score-draw').textContent = scores.draw;
  document.getElementById('score-bot').textContent = scores.bot;
}

function highlightWin(line) {
  line.forEach(i => boardEl.children[i].classList.add('win-cell'));
}

function endGame(result) {
  gameOver = true;
  locked = true;
  if (window.saveGameResult) window.saveGameResult(result);
  if (result === 'player') {
    setStatus('Вы выиграли!', 'win');
    scores.player++;
  } else if (result === 'bot') {
    setStatus('Бот победил!', 'lose');
    scores.bot++;
  } else {
    setStatus('Ничья', 'draw');
    scores.draw++;
  }
  updateScore();
  setTimeout(resetGame, 1500);
}

function playerMove(index) {
  if (gameOver || locked || board[index]) return;
  locked = true;
  board[index] = playerMark;
  renderMark(index, playerMark);

  const winLine = checkWin(board, playerMark);
  if (winLine) { highlightWin(winLine); endGame('player'); return; }
  if (isFull(board)) { endGame('draw'); return; }

  setStatus('Бот думает…');
  setTimeout(botMove, 350 + Math.random() * 300);
}

function botMove() {
  if (gameOver) return;
  let move;
  if (difficulty === 'hard') {
    move = bestMove(board, botMark);
  } else if (difficulty === 'medium') {
    move = Math.random() < 0.7 ? bestMove(board, botMark) : randomMove(board);
  } else {
    move = Math.random() < 0.3 ? bestMove(board, botMark) : randomMove(board);
  }

  board[move] = botMark;
  renderMark(move, botMark);

  const winLine = checkWin(board, botMark);
  if (winLine) { highlightWin(winLine); endGame('bot'); return; }
  if (isFull(board)) { endGame('draw'); return; }

  locked = false;
  setStatus('Ваш ход');
}

function randomMove(b) {
  const empty = b.map((v, i) => v === '' ? i : -1).filter(i => i >= 0);
  return empty[Math.floor(Math.random() * empty.length)];
}

function bestMove(b, mark) {
  let bestScore = -Infinity;
  let move = -1;
  for (let i = 0; i < 9; i++) {
    if (b[i] !== '') continue;
    b[i] = mark;
    const score = minimax(b, 0, false, mark);
    b[i] = '';
    if (score > bestScore) { bestScore = score; move = i; }
  }
  return move;
}

function minimax(b, depth, isMax, botMark) {
  const humanMark = botMark === 'X' ? 'O' : 'X';
  const winBot = checkWin(b, botMark);
  const winHuman = checkWin(b, humanMark);
  if (winBot) return 10 - depth;
  if (winHuman) return depth - 10;
  if (isFull(b)) return 0;

  if (isMax) {
    let best = -Infinity;
    for (let i = 0; i < 9; i++) {
      if (b[i] !== '') continue;
      b[i] = botMark;
      best = Math.max(best, minimax(b, depth + 1, false, botMark));
      b[i] = '';
    }
    return best;
  } else {
    let best = Infinity;
    for (let i = 0; i < 9; i++) {
      if (b[i] !== '') continue;
      b[i] = humanMark;
      best = Math.min(best, minimax(b, depth + 1, true, botMark));
      b[i] = '';
    }
    return best;
  }
}

function resetGame() {
  board = Array(9).fill('');
  gameOver = false;
  locked = false;
  createBoard();
  if (playerMark === 'O') {
    locked = true;
    setStatus('Бот думает…');
    setTimeout(botMove, 500);
  } else {
    setStatus('Ваш ход');
  }
}

function setSide(side) {
  playerMark = side;
  botMark = side === 'X' ? 'O' : 'X';
  document.querySelectorAll('[data-side]').forEach(el => {
    el.classList.toggle('active', el.dataset.side === side);
  });
  startHintEl.textContent = side === 'X' ? 'Вы ходите первым' : 'Бот ходит первым';
  startHintEl.className = 'start-hint ' + (side === 'X' ? 'first' : 'second');
  resetGame();
}

function setDifficulty(d) {
  difficulty = d;
  document.querySelectorAll('.start-diff-card[data-diff]').forEach(card => {
    card.classList.toggle('active', card.dataset.diff === d);
  });
  resetGame();
}
